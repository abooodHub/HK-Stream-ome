# إعداد nginx مبسّط لحاوية الواجهة (web) — يخدم الموقع ويعكس API الـ tracker.
# للإنتاج الكامل (SSL/OME/HLS) استخدم config/your-domain.com.conf على المضيف.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # واجهة الـ tracker: /tracker-api/dashboard → tracker:9999/api/dashboard
    location /tracker-api/ {
        proxy_pass http://tracker:9999/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        # دعم بثّ SSE للإحصائيات الحيّة (/tracker-api/public/stats/live)
        proxy_buffering     off;
        proxy_read_timeout  3600s;
    }
}
