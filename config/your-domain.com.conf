limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

server {

	server_name your-domain.com;				# << EDIT THIS! (Example: hostname.example.com)
	root /var/www/your-domain.com/web;			# << EDIT THIS! (Example: /var/www/example.com/web)

	index index.html index-nginx.html index.htm index.php;
	client_max_body_size 8192M;
	add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
	add_header X-Frame-Options "DENY" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

	error_page 404 /404.html;
	location = /404.html {
		root /var/www/your-domain.com/web;
		internal;
	}

	location / {
		add_header Cache-Control no-cache;
		try_files $uri $uri/ =404;
		}
    location /crossdomain.xml {
		root /var/www/your-domain.com/web;
		default_type text/xml;
		expires 24h;
		}
	location /control {
		allow 127.0.0.1;
		deny all;
		rtmp_control all;
		}
    # location /stat {
	# 	rtmp_stat all;
	# 	# rtmp_stat_stylesheet stat.xsl;
	# 	#auth_basic Restricted Content;		# Create a valid .htpasswd before uncommenting this.
	# 	#auth_basic_user_file .htpasswd;	# Create a valid .htpasswd before uncommenting this.
	# 	}
    location /stat.xsl {
		root /var/www/your-domain.com/web;		# << EDIT THIS! (Example: /var/www/example.com/web)
	}
	location ~ /\.ht {
		deny all;
		}
    location /ome-hls/ {
		# Referer protection
		valid_referers your-domain.com *.your-domain.com;
		if ($invalid_referer) {
			return 403;
		}

		# Authentication checks via python tracker
		auth_request      /internal/hls-auth;
		error_page 401 403 = @hls_forbidden;

		proxy_pass http://127.0.0.1:8080/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto $scheme;

		# Buffer and caching configuration for LLHLS
		proxy_buffering off;
		expires -1;
		add_header Cache-Control no-cache;
		add_header 'Access-Control-Allow-Origin' '*' always;
		add_header 'Access-Control-Expose-Headers' 'Content-Length';
		if ($request_method = 'OPTIONS') {
			add_header 'Access-Control-Allow-Origin' '*';
			add_header 'Access-Control-Max-Age' 1728000;
			add_header 'Content-Type' 'text/plain charset=UTF-8';
			add_header 'Content-Length' 0;
			return 204;
		}
	}

	location /ome-ws/ {
		proxy_pass http://127.0.0.1:3333/;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;
	}

	# OBS WebSocket proxy — requires SSH reverse tunnel active on port 4455
	location /obs-ws/ {
		proxy_pass http://127.0.0.1:4455/;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host "localhost";
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;
	}

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


    # HLS/Dash auth via tracker
    location = /internal/hls-auth {
        internal;
        proxy_pass          http://127.0.0.1:9999/api/player-auth/check;
        proxy_pass_request_body off;
        proxy_set_header    Content-Length "";
        proxy_set_header    Cookie $http_cookie;
        proxy_set_header    X-Real-IP $remote_addr;
    }
    location @hls_forbidden {
        default_type application/json;
        return 403 '{"error":"auth_required"}';
    }


    location /tracker-api/player-auth/verify {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass         http://127.0.0.1:9999/api/player-auth/verify;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_read_timeout 10s;
    }

    location /tracker-api/auth/login {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass         http://127.0.0.1:9999/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_read_timeout 10s;
    }

    # SSE endpoint - needs very long timeout (keep-alive stream)
    location /tracker-api/public/stats/live {
        proxy_pass         http://127.0.0.1:9999/api/public/stats/live;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_set_header   Connection '';
        proxy_read_timeout 3600s;
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    location /tracker-api/ {
        proxy_pass         http://127.0.0.1:9999/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_read_timeout 30s;
    }


}
server {
	listen 80;
	listen [::]:80;
	server_name your-domain.com;
	return 301 https://$host$request_uri;
}

