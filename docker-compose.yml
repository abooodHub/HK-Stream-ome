# تشغيل HK-Stream-ome محلياً/كقاعدة نشر بسيطة عبر Docker.
# الأسرار تُقرأ من ملف .env (انسخه من .env.example) — اختياري للتشغيل المحلي.
# ملاحظة: OvenMediaEngine يبقى حاوية منفصلة، وشهادة SSL تُدار على مستوى المضيف/certbot.

services:
  tracker:
    build: .
    environment:
      TRACKER_HOST: "0.0.0.0"
      TRACKER_PORT: "9999"
      FOOTBALL_API_KEY: "${FOOTBALL_API_KEY:-}"
      OME_API_TOKEN: "${OME_API_TOKEN:-}"
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN:-http://localhost:8080}"
    volumes:
      - tracker-data:/opt/ome-tracker/data   # حفظ الجلسات/الحظر/الإعدادات عبر إعادة التشغيل
    expose:
      - "9999"
    restart: unless-stopped

  web:
    image: nginx:alpine
    depends_on:
      - tracker
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./deploy/docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  tracker-data:
